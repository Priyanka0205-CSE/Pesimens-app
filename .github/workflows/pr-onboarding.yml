name: PR Onboarding

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  onboard-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Auto assign, label, and welcome
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            if (author.endsWith('[bot]')) {
              return;
            }

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              assignees: [author],
            });

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: ['gssoc:approved'],
              });
            } catch (error) {
              console.log(`Skipping missing label gssoc:approved: ${error.message}`);
            }

            const association = pr.author_association;
            if (['FIRST_TIMER', 'FIRST_TIME_CONTRIBUTOR'].includes(association)) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: `Welcome @${author}! Thanks for your first contribution 🎉`,
              });
            }
